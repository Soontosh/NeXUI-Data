    "runtime_recipe": "frappe_docker + local compose override",
    "notes": "Validated ERPNext runtime on top of the official frappe_docker demo stack. The local reseed script performs a full volume reset, waits for site creation, completes the first-run setup wizard automatically, and seeds deterministic customer, item, supplier, address, and contact fixtures before task runs on localhost:8090."
  },
