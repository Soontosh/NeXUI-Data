{
  "schema_version": "0.0",
  "site_id": "pretix-self-hosted",
  "site_name": "pretix Self-Hosted",
  "base_url": "http://localhost:8100/",
  "source_track": "modern_authenticated_app",
  "category": "other",
  "hosting_mode": "self_hosted",
  "redistribution_class": "redistributable_source",
  "authoring_status": "validated",
  "reset_strategy": "reseed_command",
  "determinism_level": "high",
  "legal_review_status": "documented",
  "auth": {
    "auth_type": "seeded_local_account",
    "credentials_env_vars": [],
    "notes": "Use the deterministic control login created by the standalone bootstrap: admin@localhost / admin. The first recorded task batch keeps login steps inside every recipe."
  },
  "task_families": [
    "organizer_navigation",
    "event_navigation",
    "product_configuration",
    "orders_and_attendees",
    "cross_view_event_workflows"
  ],
  "difficulty_bands": [
    "hard",
    "very_hard"
  ],
  "onboarding": {
    "bootstrap_doc": "bootstrap.md",
    "reset_doc": "reset-notes.md",
    "seed_notes_doc": "seed-notes.md",
    "setup_notes": "Use official pretix self-hosting guidance and the official pretix repository as the source of truth. The current local runtime uses the official pretix standalone image on localhost:8100 plus a deterministic reseed script that recreates one organizer, one event, and one ticket product."
  },
  "runtime": {
    "local_checkout_path": "../../external/pretix",
    "healthcheck_url": "http://localhost:8100/control/",
    "bootstrap_commands": [
      "git clone https://github.com/pretix/pretix external/pretix",
      "export DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock",
      "docker pull pretix/standalone:stable",
      "./scripts/reseed_pretix.sh"
    ],
    "start_command": "export DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock && docker rm -f pretix-nexui >/dev/null 2>&1 || true && docker run -d --name pretix-nexui -p 8100:80 -v pretix-nexui-data:/var/pretix/data -v pretix-nexui-public:/public pretix/standalone:stable",
    "reseed_command": "./scripts/reseed_pretix.sh",
    "notes": "The standalone runtime boots on localhost:8100 and the repo-managed reseed script wipes the named volumes, recreates the container, logs into the control panel, enables admin mode, creates the seeded organizer/event, and saves a single General Admission product. The bundled task/cron workers still log AMQP warnings, but the Pretix control-panel batch now includes product detail, a bounded add-product flow, and a reseed-required save-and-verify workflow."
  },
  "capture_defaults": {
    "browser": "chromium",
    "wait_until": "load",
    "delay_ms": 3000,
    "timeout_ms": 30000,
    "viewport_width": 1440,
    "viewport_height": 900,
    "locale": "en-US"
  },
  "entry_points": [
    {
      "entry_id": "login",
      "label": "Control Login",
      "url": "http://localhost:8100/control/",
      "goal_hint": "Survey the pretix organizer login page and determine stable selectors for deterministic first-batch login steps.",
      "notes": "The first recorded task batch should log in explicitly rather than depending on stored session state."
    },
    {
      "entry_id": "events",
      "label": "Events List",
      "url": "http://localhost:8100/control/events/",
      "goal_hint": "Inspect the organizer events list after logging in and use it for event navigation, list filtering, and list-to-detail task planning.",
      "notes": "This route is auth-gated but deterministic once logged in with the standalone bootstrap account."
    },
    {
      "entry_id": "event-settings",
      "label": "Seeded Event Settings",
      "url": "http://localhost:8100/control/event/nexui/nexui-event/settings/",
      "goal_hint": "Inspect a seeded event administration surface for event-detail and organizer-workflow tasks after authenticating.",
      "notes": "This route is auth-gated and depends on the seeded organizer/event created by the reseed script."
    },
    {
      "entry_id": "products",
      "label": "Products List",
      "url": "http://localhost:8100/control/event/nexui/nexui-event/items/",
      "goal_hint": "Inspect product configuration and list-to-form workflows after authenticating into the seeded event.",
      "notes": "This is the preferred first mutable domain now that the reseed script seeds a General Admission product."
    }
  ],
