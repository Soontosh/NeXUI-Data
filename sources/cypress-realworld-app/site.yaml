{
  "schema_version": "0.0",
  "site_id": "cypress-realworld-app",
  "site_name": "Cypress Real World App",
  "base_url": "http://localhost:3000/",
  "source_track": "modern_authenticated_app",
  "category": "finance_demo",
  "hosting_mode": "self_hosted",
  "redistribution_class": "redistributable_source",
  "authoring_status": "validated",
  "reset_strategy": "reseed_command",
  "determinism_level": "high",
  "legal_review_status": "documented",
  "reset_verified": true,
  "source_priority": 1,
  "auth": {
    "auth_type": "seeded_local_account",
    "credentials_env_vars": [],
    "notes": "Use seeded local accounts from the application fixture data. The upstream project documents a default password of s3cret for example users."
  },
  "task_families": [
    "authenticated_navigation",
    "account_activity_verification",
    "payment_request_flows",
    "cross_view_state_checks",
    "safety_bounded_money_actions"
  ],
  "difficulty_bands": [
    "medium",
    "hard",
    "very_hard"
  ],
  "onboarding": {
    "bootstrap_doc": "bootstrap.md",
    "reset_doc": "reset-notes.md",
    "seed_notes_doc": "seed-notes.md",
    "setup_notes": "Preferred source for modern authenticated workflows. Keep it self-hosted and reseeded so entity-level verification remains deterministic."
  },
  "runtime": {
    "local_checkout_path": "../../external/cypress-realworld-app",
    "healthcheck_url": "http://localhost:3000/signin",
    "bootstrap_commands": [
      "git clone https://github.com/cypress-io/cypress-realworld-app external/cypress-realworld-app",
      "cd external/cypress-realworld-app && corepack yarn install"
    ],
    "start_command": "cd external/cypress-realworld-app && corepack yarn dev",
    "reseed_command": "cd external/cypress-realworld-app && corepack yarn db:seed:dev",
    "notes": "Validated locally with Corepack Yarn Classic and the upstream local-auth seeded stack. The unauthenticated root redirects to /signin, so authenticated tasks should either start from the sign-in page or use an explicit auth bootstrap."
  },
  "capture_defaults": {
    "browser": "chromium",
    "wait_until": "load",
    "delay_ms": 0,
    "timeout_ms": 30000,
    "viewport_width": 1440,
    "viewport_height": 900,
    "locale": "en-US"
  },
  "entry_points": [
    {
      "entry_id": "signin",
      "label": "Sign In",
      "url": "http://localhost:3000/signin",
      "goal_hint": "Survey the sign-in surface and seeded-user workflows.",
      "notes": "Use only seeded example accounts and fixture data documented in the self-hosted setup. This entry point is the stable starting surface for the first authenticated tasks."
    },
    {
      "entry_id": "personal",
      "label": "Personal Dashboard",
      "url": "http://localhost:3000/",
      "goal_hint": "Survey account activity, transaction feeds, and request/payment flows after login.",
      "notes": "Unauthenticated visits redirect to /signin. Use this as the post-login destination for authenticated navigation, filters, and cross-view verification tasks."
    }
  ],
  "task_ideas": [
