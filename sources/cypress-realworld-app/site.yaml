  "review": {
    "owner": "",
    "notes": "Primary self-hosted track for modern authenticated UI workflows. The source is now online, surveyable, and validated with authenticated feed navigation, contact-step navigation for multiple seeded users, notification state changes, bank-account navigation, bank-account creation and deletion boundaries, cross-view comment verification, cross-view request and payment verification, multiple confirmation-boundary money flows, and a monstrous reset-aware request-create, feed-reopen, comment-mutate, and final detail-reverification workflow."
