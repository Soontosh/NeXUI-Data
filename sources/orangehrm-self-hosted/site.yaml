{
  "schema_version": "0.0",
  "site_id": "orangehrm-self-hosted",
  "site_name": "OrangeHRM Self-Hosted",
  "base_url": "http://localhost:8080/",
  "source_track": "enterprise_workflow",
  "category": "hr_demo",
  "hosting_mode": "self_hosted",
  "redistribution_class": "redistributable_source",
  "authoring_status": "validated",
  "reset_strategy": "reseed_command",
  "determinism_level": "high",
  "auth": {
    "auth_type": "seeded_local_account",
    "credentials_env_vars": [],
    "notes": "Use a seeded local admin account defined by the self-hosted deployment and fixture setup."
  },
  "task_families": [
    "employee_search",
    "leave_and_attendance_workflows",
    "profile_updates",
    "admin_navigation",
    "table_filter_and_detail_review"
  ],
  "difficulty_bands": [
    "medium",
    "hard",
    "very_hard"
  ],
  "onboarding": {
    "bootstrap_doc": "bootstrap.md",
    "reset_doc": "reset-notes.md",
    "seed_notes_doc": "seed-notes.md",
    "setup_notes": "Use the official OrangeHRM open-source development environment plus the OrangeHRM source checkout. This workspace uses rootless Docker via DOCKER_HOST, a repo-managed start wrapper that temporarily patches the PHP 8.1 vhost for localhost access, and a deterministic reseed script that rebuilds the seed employees and leave balance without leaving benchmark-specific edits in external/."
  },
  "runtime": {
    "local_checkout_path": "../../external/orangehrm-os-dev-environment",
    "healthcheck_url": "http://localhost:8080/",
    "bootstrap_commands": [
      "Clone https://github.com/orangehrm/orangehrm.git into external/orangehrm",
      "Clone https://github.com/orangehrm/orangehrm-os-dev-environment.git into external/orangehrm-os-dev-environment",
      "Install Docker Compose as a user-space CLI plugin if it is not already available",
      "Run ./scripts/start_orangehrm.sh once to create external/orangehrm-os-dev-environment/.env and build the localhost-bound nginx image for this workspace"
    ],
    "start_command": "./scripts/start_orangehrm.sh",
    "reseed_command": "./scripts/reseed_orangehrm.sh",
    "notes": "Official dev-environment path with rootless Docker. Use DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock for local commands. The validated start and reseed paths now apply localhost and installer patches only transiently, then restore the nested OrangeHRM checkouts. The reseed path rebuilds the OrangeHRM install, frontend bundle, seeded employees Ava Patel and Marcus Lee, and an Annual Leave balance for the benchmark admin account."
  },
  "capture_defaults": {
    "browser": "chromium",
    "wait_until": "load",
    "delay_ms": 3000,
    "timeout_ms": 30000,
    "viewport_width": 1440,
    "viewport_height": 900,
    "locale": "en-US"
  },
  "entry_points": [
    {
      "entry_id": "login",
      "label": "Login",
      "url": "http://localhost:8080/",
      "goal_hint": "Survey the login page and seeded admin-user workflow surface once the PHP 8.1 container is online.",
      "notes": "Keep login credentials in local seed notes and avoid using the public hosted demo."
    },
    {
      "entry_id": "pim",
      "label": "PIM / Employee Management",
      "url": "http://localhost:8080/web/index.php/pim/viewEmployeeList",
      "goal_hint": "Survey employee search, filtering, row actions, and detail-page verification tasks once authenticated bootstrap is available.",
      "notes": "Useful after the local admin account is installed, the client bundle is built, and login flow is stable."
    },
    {
      "entry_id": "leave",
      "label": "Leave / Apply Leave",
      "url": "http://localhost:8080/web/index.php/leave/applyLeave",
      "goal_hint": "Survey leave-application workflows and confirmation-boundary tasks against the seeded Annual Leave balance.",
      "notes": "Use the reseeded admin account after login. The deterministic seed exposes Annual Leave with a 10-day balance for bounded leave-request authoring."
    }
  ],
