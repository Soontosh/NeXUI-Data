                        - paragraph: Return To Sender
                        - text: "When questioned whether their results would be affected if air conditioners were found to be used on cold days, Wahoonie responded: \"we had one guy in the lab whining those kinds of questions. 'Why are you doing this? Why are there all those discrepencies in the department accounts?', but it was after we had written up the results. We later found that he took 40% of his sick days on Mondays or Fridays. How convenient. Some people have no shame.\""
                        - table:
                          - rowgroup:
                            - row "Air-Con Fact Finding Mission Mrs B. Wahoonie investigates shipping hot air to Australia There has been a significant drop in brain donations as a result of the successful 'Slow Traffic, Safe Streets' policy, say city doctors. \"Brain donations are essential\" said Dr. Liam Colluspid of Central Hospital, at a press conference yesterday. \"I must ask that the Mayor either dispenses with these road safety measures, or else that every concerned citizen should consider right now whether there are any brains they aren't making much use of at the moment, that they might like to drop off\".":
