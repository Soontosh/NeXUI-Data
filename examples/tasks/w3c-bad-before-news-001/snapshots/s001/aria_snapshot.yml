                      - cell:
                        - paragraph: Citylights News
                        - paragraph: Heat wave linked to temperatures
                        - paragraph: Man Gets Nine Months in Violin Case
                        - text: "After three years of effort city scientists now agree that the primary cause of the 2003 heatwave was hot air from our air conditioning units. \"The study cost the city taxpayer under 10 million dollars\" said Prof. Steve 'Call me Stephen' Wahoonie, of City University Public Expenditure on Science dept. \"We had five top statisticians working on it: one to write the grant proposal, one to do the mathematical modelling, two to collaborate on the research paper, and one to hire a student to do the job.\" As news of the conviction and sentencing of infamous violin thief Pasquale Ginkgo-Biloba reached city hall, Mayor Auberon 'Slim' Shadi stated that he was furious at the boring sentence handed down by the judge in the case, and is demanding a review of sentencing policy. This is not the first time that judges have come under fire for lenient sentencing in musical-instrument related cases. Last year's"
                        - link "trombone forgery debacle":
                          - /url: ../offsite.html
                        - text: also resulted in a formal rebuke from the Mayor.
                        - paragraph: Tough Wahoonie
                        - text: "\"We soon realized that we were seeing a rise in temperatures every time a heatwave occurred. Also, the more air conditioning used, the bigger the heatwave. We knew it couldn't just be a coincidence, the match was 100%. Air conditioning was driving temperatures up, which in turn resulted in a heatwave,\" the Prof. explained. \"It all comes from"
                        - link "the way that air conditioning works":
                          - /url: ../offsite.html
                        - text: . Air conditioners produce cold air to go into the room but also hot air that's ducted away to the outside. We are recommending a new city ordinance restricting use of air conditioning to winter months, when the heat will come in useful."
