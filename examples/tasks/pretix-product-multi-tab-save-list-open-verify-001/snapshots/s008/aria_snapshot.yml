  - checkbox "Allow product to be canceled or changed" [checked]
  - text: Allow product to be canceled or changed If this is checked, the usual cancellation and order change settings of this event apply. If this is unchecked, orders containing this product can not be canceled by users but only by you.
  - checkbox "Show a waiting list for this ticket" [checked]
  - text: Show a waiting list for this ticket This will only work if waiting lists are enabled for this event. Only show after sellout of Optional
  - combobox "Shown independently of other products":
    - textbox
  - text: If you select a product here, this product will only be shown when that product is no longer available. This will happen either because the other product has sold out or because the time is outside of the sales window for the other product. If combined with the option to hide sold-out products, this allows you to swap out products for more expensive ones once the cheaper option is sold out. There might be a short period in which both products are visible while all tickets of the referenced product are reserved, but not yet sold.
