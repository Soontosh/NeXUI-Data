- heading "Using the Demo" [level=2]
- paragraph: "This Demo serves a variety of purposes such as raising awareness on web accessibility or for providing practical examples for developers. Some of the common ways of using and navigating through the Demo include:"
- list:
  - listitem:
    - strong: "Preparing presentations on web accessibility:"
    - text: Demonstrating practical examples during presentation is usually very effective. The description pages provide an overview of the accessibility barriers and features that are shown in the Demo. Together with the inaccessible and accessible Demo pages, concrete before and after examples can be explained during presentations.
  - listitem:
    - strong: "Learning about specific web accessibility barriers:"
    - text: Often web developers want to learn more about specific accessibility barriers. For example, what is the cause of a problem and how can it be fixed? While the evaluation reports provide detailed analysis, the inaccessible and accessible Demo pages provide implementation examples for developers to study.
  - listitem:
    - strong: "Understanding the implications of web accessibility barriers:"
    - text: In certain cases, the real issues for people with disabilities are not clear to developers or managers. Browsing through the inaccessible Demo pages using different browser configurations or assistive technologies (such as screen readers and magnifiers) helps highlight these issues. The accessible Demo pages can be browsed in the same manner to show the difference.
  - listitem:
    - strong: "Writing detailed reports of conformance evaluations:"
    - text: A well written evaluation report is key in the process of retrofitting websites for accessibility. It communicates the problems to managers and the developers who need to decide which solutions to implement. The evaluation reports of the Demo serve as a sample format for evaluators.
