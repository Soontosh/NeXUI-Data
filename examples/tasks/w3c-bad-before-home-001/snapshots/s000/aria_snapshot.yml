- heading "About the Demo" [level=2]
- paragraph:
  - text: The Before and After Demonstration is a multi-page resource that shows an inaccessible website and a retrofitted version of this same website. Each web page includes inline annotations that can be activated to highlight some of the key accessibility barriers or repairs. Each web page is also accompanied by an evaluation report to inform the developers on the level of conformance to the
  - link "Web Content Accessibility Guidelines (WCAG)":
    - /url: https://www.w3.org/WAI/intro/wcag
  - text: .
- paragraph:
  - strong: "Note:"
  - text: This Demo is intended to illustrate some of the aspects of web accessibility. It does not cover every type of accessibility barrier or accessibility requirement. Some of the inaccessible Demo content may not be easily usable by all readers.
