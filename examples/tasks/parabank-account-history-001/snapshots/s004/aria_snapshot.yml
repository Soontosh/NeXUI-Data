- heading "Account Activity" [level=1]
- table:
  - rowgroup:
    - 'row "Activity Period: All"':
      - cell "Activity Period:"
      - cell "All":
        - combobox:
          - option "All" [selected]
          - option "January"
          - option "February"
          - option "March"
          - option "April"
          - option "May"
          - option "June"
          - option "July"
          - option "August"
          - option "September"
          - option "October"
          - option "November"
          - option "December"
    - 'row "Type: All"':
      - cell "Type:"
      - cell "All":
        - combobox:
          - option "All" [selected]
          - option "Credit"
          - option "Debit"
    - row "Go":
      - cell
      - cell "Go":
        - button "Go"
