  - text: If you have many products, you can optionally sort them into categories to keep things organized. Product type
  - radio " Admission product Every purchase of this product represents one person who is allowed to enter your event. By default, we will only offer ticket downloads for these products. Only purchases of such products will be considered \"attendees\" for most statistical purposes or within some plugins. This option should be set for most things that you would call a \"ticket\". For product add-ons or bundles, this should be set on the main ticket, except if the add-on products or bundled products represent additional people (e.g. group bundles)." [checked]
  - text: 
  - strong: Admission product
  - text: Every purchase of this product represents one person who is allowed to enter your event. By default, we will only offer ticket downloads for these products. Only purchases of such products will be considered "attendees" for most statistical purposes or within some plugins. This option should be set for most things that you would call a "ticket". For product add-ons or bundles, this should be set on the main ticket, except if the add-on products or bundled products represent additional people (e.g. group bundles).
  - 'radio " Non-admission product A product that does not represent a person. By default, we will not offer ticket downloads (but you can still enable ticket downloads in event settings or product settings). Examples: Merchandise, donations, gift cards, add-ons to a main ticket."'
  - text: 
  - strong: Non-admission product
  - text: "A product that does not represent a person. By default, we will not offer ticket downloads (but you can still enable ticket downloads in event settings or product settings). Examples: Merchandise, donations, gift cards, add-ons to a main ticket. Personalization"
  - radio " Personalized ticket When this ticket is purchased, the system will ask for a name or other details according to your event settings." [checked]
  - text: 
  - strong: Personalized ticket
  - text: When this ticket is purchased, the system will ask for a name or other details according to your event settings.
  - radio " Non-personalized ticket The system will not ask for a name or other attendee details. This only affects system-provided fields, you can still add your own questions."
  - text: 
  - strong: Non-personalized ticket
  - text: The system will not ask for a name or other attendee details. This only affects system-provided fields, you can still add your own questions.
