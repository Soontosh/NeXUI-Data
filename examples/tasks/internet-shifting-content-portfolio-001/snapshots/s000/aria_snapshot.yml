- 'heading "Shifting Content: Menu Element" [level=3]'
- paragraph: This example demonstrates a menu element shifting a few pixels in either direction on each page load.
- paragraph:
  - text: To load it randomly, append
  - code: "?mode=random"
  - text: to the URL. Or
  - link "click here":
    - /url: /shifting_content/menu?mode=random
  - text: .
- paragraph:
  - text: To specify a differant numbor of pixels to shift the example, append
  - code: "?pixel_shift=100"
  - text: to the URL. Or
  - link "click here":
    - /url: /shifting_content/menu?pixel_shift=100
  - text: .
- paragraph:
  - text: To do both together, use
  - code: "?mode=random&pixel_shift=100"
  - text: . Or
  - link "click here":
    - /url: /shifting_content/menu?mode=random&pixel_shift=100
  - text: .
